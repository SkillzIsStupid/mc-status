<!DOCTYPE html>
<html>
<head>
  <title>Cut in the Butt SMP</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
      min-width: 300px;
    }

    .online { color: #22c55e; }
    .offline { color: #ef4444; }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #334155;
      margin: 5px;
      padding: 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>🎮 Minecraft Server</h1>

  <div class="card">
    <h2 id="status">Checking...</h2>
    <p id="players"></p>
    <ul id="list"></ul>
  </div>

  <script>
    async function update() {
      const res = await fetch("/api");
      const data = await res.json();

      const statusEl = document.getElementById("status");
      const playersEl = document.getElementById("players");
      const listEl = document.getElementById("list");

      if (data.online) {
        statusEl.innerText = "🟢 ONLINE";
        statusEl.className = "online";
        playersEl.innerText = `${data.players}/${data.max}`;

        listEl.innerHTML = "";
        data.names.forEach(p => {
          let li = document.createElement("li");
          li.innerText = p;
          listEl.appendChild(li);
        });

      } else {
        statusEl.innerText = "🔴 OFFLINE";
        statusEl.className = "offline";
        playersEl.innerText = "";
        listEl.innerHTML = "";
      }
    }

    setInterval(update, 5000);
    update();
  </script>

</body>
</html>
